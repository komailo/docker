name: Reusable Image Build Workflow

on:
  workflow_call:
    inputs:
      image_paths:
        required: true
        type: string
        description: "Comma-separated list of image directory paths (e.g., 'git-sync,github-runner/general-purpose')"
      platforms:
        required: true
        type: string
    secrets:
      token:
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_paths: ${{ steps.set_variables.outputs.image_paths }}
      should_run_build: ${{ steps.changes.outputs.src == 'true' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}
    steps:
      - id: set_variables
        run: |
          # Convert comma-separated paths to a JSON array for the matrix
          image_paths_json=$(echo -n "${{ inputs.image_paths }}" | jq -R -s -c 'split(",") | map(gsub("^[./]+|/$"; ""))')
          echo "image_paths=$image_paths_json" >> $GITHUB_OUTPUT
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            src:
              - '.github/workflows/reusable-image-build.yaml'
              - '**/Dockerfile'
              - '**/*.nix'
              - '**/*.txt'

  build:
    permissions:
      id-token: write
      packages: write
      contents: read
      attestations: write
    env:
      docker_push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
      build_required: ${{ needs.setup.outputs.should_run_build }}
      # Image name is derived directly from the path
      image_name: ${{ matrix.image_path }}
      context_path: ./${{ matrix.image_path }}
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image_path: ${{ fromJson(needs.setup.outputs.image_paths) }}
      fail-fast: false
    steps:
      - name: Checkout Code
        if: env.build_required
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Set up QEMU
        if: env.build_required
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      - name: Set up Docker Buildx
        if: env.build_required
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: network=host

      - name: Docker meta
        if: env.build_required
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ env.image_name }}
          labels: |
            org.opencontainers.image.authors="@${{ github.repository_owner }} Github Org"
            org.opencontainers.image.licenses=BSD-3
            org.opencontainers.image.source=${{ github.repositoryUrl }}
          tags: |
            type=semver,pattern={{major}},prefix=v,event=tag
            type=semver,pattern={{major}}.{{minor}},prefix=v,event=tag
            type=semver,pattern={{major}}.{{minor}}.patch,prefix=v,event=tag
            type=raw,event=push,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          flavor: |
            latest=false

      - name: Log in to the Container registry
        if: env.build_required
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io/${{ github.repository }}/${{ env.image_name }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and if required push image"
        if: env.build_required
        id: build_push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: ${{ env.context_path }}
          build-args: |
            IMAGE_COMMIT=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            IMAGE_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          platforms: ${{ inputs.platforms }}
          push: ${{ env.docker_push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.description'] }}

      - name: Generate artifact attestation
        if: env.build_required && env.docker_push
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ env.image_name }}
          subject-digest: ${{ steps.build_push.outputs.digest }}
          push-to-registry: ${{ env.docker_push }}
